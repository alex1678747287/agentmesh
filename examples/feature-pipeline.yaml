# Example pipeline with conditional branches
# analyze -> implement -> review (if success) / hotfix (if fail)
name: feature-pipeline
tasks:
  - id: analyze
    prompt: "Analyze the current project structure and suggest improvements"
    agent: openclaw

  - id: implement
    prompt: "Implement the suggested improvements"
    agent: claude_code
    depends_on: [analyze]

  - id: review
    prompt: "Review the implementation for code quality and security"
    agent: codex_cli
    depends_on: [implement]
    condition:
      "on": implement
      if_exit: 0  # only review if implementation succeeded

  - id: hotfix
    prompt: "Fix the failed implementation based on error output"
    agent: claude_code
    depends_on: [implement]
    condition:
      "on": implement
      if_exit: 1  # only hotfix if implementation failed
